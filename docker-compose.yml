services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utm_cakephp2_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: utm_test
      DB_USER: cake
      DB_PASSWORD: cake
      APP_ENV: local
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    container_name: utm_cakephp2_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: utm_test
      MYSQL_USER: cake
      MYSQL_PASSWORD: cake
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql_data: